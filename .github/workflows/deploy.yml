name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            # Navigate to the deployment directory
            cd /opt/teslacharger
            
            # Pull the latest code
            # Note: The droplet must have its deploy key added to GitHub for this to work
            git pull origin main
            
            # Write Google Service Account JSON from secret
            echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > backend/google-credentials.json
            
            # Rebuild and restart the production containers
            docker compose -f docker-compose.prod.yml up -d --build
