name: teslacharger

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      mqtt:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--proxy-headers", "--forwarded-allow-ips=*"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 12

  mqtt:
    image: eclipse-mosquitto:latest
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./telemetry/mosquitto.conf:/mosquitto/config/mosquitto.conf

  fleet-telemetry:
    image: tesla/fleet-telemetry:latest
    restart: unless-stopped
    ports:
      - "4443:4443"
    volumes:
      - ./telemetry/server_config.json:/etc/fleet-telemetry/config.json
      - ./telemetry/certs:/etc/fleet-telemetry/certs
    depends_on:
      - mqtt
    command: ["/fleet-telemetry", "-config=/etc/fleet-telemetry/config.json"]

volumes:
  pgdata:

