name: teslacharger-prod

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

  mqtt:
    image: eclipse-mosquitto:latest
    restart: unless-stopped
    volumes:
      - ./telemetry/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  fleet-telemetry:
    image: tesla/fleet-telemetry:latest
    restart: unless-stopped
    ports:
      - "4443:4443"
    volumes:
      - ./telemetry/server_config.json:/etc/fleet-telemetry/config.json:ro
      - ./telemetry/certs:/etc/fleet-telemetry/certs:ro
    depends_on:
      - mqtt
    command: ["/fleet-telemetry", "-config=/etc/fleet-telemetry/config.json"]

  command-proxy:
    image: tesla/vehicle-command:latest
    restart: unless-stopped
    volumes:
      - ./backend/com.tesla.3p.private-key.pem:/config/fleet-key.pem:ro
      - ./telemetry/certs:/config/certs:ro
    command: ["-tls-key", "/config/certs/server.key", "-cert", "/config/certs/server.crt", "-key-file", "/config/fleet-key.pem", "-host", "0.0.0.0", "-port", "4443"]

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      - PLAY_SERVICE_ACCOUNT_JSON_PATH=/app/google-credentials.json
      - APPSTORE_PRIVATE_KEY_PATH=/app/appstore_private_key.p8
    depends_on:
      mqtt:
        condition: service_started
      command-proxy:
        condition: service_started
    volumes:
      - ./backend/com.tesla.3p.public-key.pem:/app/com.tesla.3p.public-key.pem:ro
      - ./backend/google-credentials.json:/app/google-credentials.json:ro
      - ./backend/appstore_private_key.p8:/app/appstore_private_key.p8:ro
      - ./telemetry/certs/server.crt:/app/server.crt:ro
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers", "--forwarded-allow-ips=*"]

volumes:
  caddy_data:
  caddy_config:
